name = "ev2090-mcp"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Durable Object bindings ──
# MCPSession is local to this worker; others are cross-worker refs to ev-2090-ws

[[durable_objects.bindings]]
name = "MCP_SESSION"
class_name = "MCPSession"

[[durable_objects.bindings]]
name = "ECONOMY_REGION"
class_name = "EconomyRegionDO"
script_name = "ev-2090-ws"

[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"
script_name = "ev-2090-ws"

[[durable_objects.bindings]]
name = "BOARD_ROOM"
class_name = "BoardRoom"
script_name = "ev-2090-ws"

[[durable_objects.bindings]]
name = "SHIP_FORGE"
class_name = "ShipForge"
script_name = "ev-2090-ws"

[[migrations]]
tag = "v1"
new_classes = ["MCPSession"]

# ── R2 Buckets (shared with game worker) ──
[[r2_buckets]]
binding = "STATIC_DATA"
bucket_name = "ev2090-data"

[[r2_buckets]]
binding = "SHIP_MODELS"
bucket_name = "ev2090-ships"

# ── Service binding to game worker (fallback for admin API calls) ──
[[services]]
binding = "GAME_API"
service = "ev-2090-ws"

# ── Variables ──
[vars]
WORKER_VERSION = "1.0.0"
LOG_LEVEL = "info"
ALLOWED_ORIGINS = "https://claude.ai,https://ev2090.com,https://mcp.ev2090.com"

[observability.logs]
enabled = true
invocation_logs = true
